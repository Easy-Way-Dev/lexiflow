name: lexiflow
description: AI-powered language learning flashcard app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.8.3

  # State Management
  flutter_riverpod: ^2.4.9

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Image Handling
  image_picker: ^1.0.5

  # Audio
  audioplayers: ^6.0.0
  record: ^6.0.0

  # HTTP & API
  http: ^1.1.2

  # Local Storage
  shared_preferences: ^2.2.2

  # Utils
  uuid: ^4.2.2
  intl: ^0.19.0

  # Import/Export
  archive: ^3.4.10
  file_picker: ^10.3.10
  share_plus: ^7.2.1

  # Video
  webview_flutter: ^4.4.2
  url_launcher: ^6.3.2
  confetti: ^0.8.0
  smooth_page_indicator: ^2.0.1

dependency_overrides:
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.14.0
  build_runner: ^2.4.7
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.1

flutter_native_splash:
  color: '#EDE8FF'
  image: assets/icons/app_icon.png
  color_dark: '#1A1030'
  image_dark: assets/icons/app_icon.png
  android_12:
    image: assets/icons/app_icon.png
    color: '#EDE8FF'
    image_dark: assets/icons/app_icon.png
    color_dark: '#1A1030'
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
    icon_size: 48
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: '#EDE8FF'
  adaptive_icon_foreground: assets/icons/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/templates/
    - assets/icons/